# ==========================================
# MONGODB
# ==========================================
spring.data.mongodb.host=${MONGODB_HOST:localhost}
spring.data.mongodb.port=${MONGODB_PORT:27017}
spring.data.mongodb.database=${MONGODB_DATABASE:quefominha}
# Para conexão autenticada em produção, use a URI completa:
# spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/quefominha}

# ==========================================
# JWT
# ==========================================
# CRÍTICO: nunca commitar o valor real. Em produção, usar variável de ambiente JWT_SECRET_KEY.
# Gere uma chave segura com: openssl rand -hex 32
jwt.secret-key=${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
# Expiração do access token em milissegundos (padrão: 24 horas)
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# CORS
# ==========================================
# Em produção, substituir pelo domínio real (ex: https://quefominha.com.br)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4300}

# ==========================================
# PAGAMENTO
# ==========================================
payment.pay.url=${PAYMENT_URL:http://localhost:8081/pay/payments}
# CRÍTICO: nunca commitar o token real. Em produção, usar variável de ambiente.
payment.pay.token=${PAYMENT_TOKEN:r2d2}
